<script>
  const state = {
    user: '',
    activeTab: 'dashboard',
    dateSelected: new Date().toISOString().slice(0, 10),
    storeFilter: 'All',
    config: { refreshIntervalMs: 5 * 60 * 1000, defaultStores: [] },
    dashboardData: null,
    checklistData: null,
    categories: { all: [], enabled: [] },
    categoryData: {},
    links: {},
    drafts: { categories: [], links: [], entries: {} },
    manageMode: {}
  };

  const api = {
    call(name, args = []) {
      return new Promise((resolve, reject) => {
        google.script.run.withSuccessHandler(resolve).withFailureHandler(reject)[name](...args);
      });
    },
    getAuthStatus() { return this.call('getAuthStatus'); },
    getBootstrapPayload(dateIso, store) { return this.call('getBootstrapPayload', [dateIso, store]); },
    getChecklist(date, store) { return this.call('getChecklist', [date, store]); },
    setChecklistItem(payload) { return this.call('setChecklistItem', [payload]); },
    saveCompetitionEntries(payload) { return this.call('saveCompetitionEntries', [payload]); },
    saveCompetitionCategories(payload) { return this.call('saveCompetitionCategories', [payload]); },
    saveAppLinks(payload) { return this.call('saveAppLinks', [payload]); }
  };

  const toast = (message) => {
    const node = document.getElementById('toast');
    node.textContent = message;
    node.classList.remove('hidden');
    setTimeout(() => node.classList.add('hidden'), 3000);
  };

  const esc = (v) => String(v || '').replace(/[&<>'"]/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '\'': '&#39;', '"': '&quot;' }[c]));
  const fmt = (n) => Number(n || 0).toLocaleString();

  function setLoading(step, percent) {
    document.getElementById('loading-status').textContent = step;
    const p = Math.max(0, Math.min(100, Number(percent) || 0));
    document.getElementById('loading-bar').style.width = `${p}%`;
    document.getElementById('loading-percent').textContent = `${p}%`;
  }

  function getNavTabs() {
    const dynamic = (state.categories.enabled || []).map((cat) => ({
      key: `category:${cat.categoryKey}`,
      label: `Competition: ${cat.categoryName}`
    }));

    return [
      { key: 'dashboard', label: 'Dashboard Page' },
      ...dynamic,
      { key: 'checklist', label: 'Checklist Page' },
      { key: 'metrics_admin', label: 'Metrics Admin Page' },
      { key: 'links_admin', label: 'Links Admin Page' }
    ];
  }

  function renderTopTabs() {
    const tabs = getNavTabs();
    if (!tabs.some((tab) => tab.key === state.activeTab)) {
      state.activeTab = 'dashboard';
    }
    document.getElementById('top-tabs').innerHTML = tabs
      .map((tab) => `<button data-tab="${tab.key}" class="tab ${state.activeTab === tab.key ? 'active' : ''}">${esc(tab.label)}</button>`)
      .join('');
  }

  function setupTabs() {
    document.getElementById('top-tabs').addEventListener('click', (event) => {
      const btn = event.target.closest('[data-tab]');
      if (!btn) return;
      state.activeTab = btn.dataset.tab;
      renderTopTabs();
      renderCurrentTab();
    });
  }

  function renderDashboard() {
    const data = state.dashboardData;
    const competitionRows = (data.competitionsSummary || []).slice(0, 5)
      .map((item) => `<tr><td>${esc(item.metric)}</td><td>${esc(item.leader ? item.leader.csr : '-')}</td><td class="number">${fmt(item.leader ? item.leader.value : 0)}</td></tr>`)
      .join('');

    return `<section class="grid">
      <article class="card span-8">
        <h2>Sales Comparison</h2>
        <p class="caption">Last updated: ${esc(data.generatedAt)}</p>
        <table class="data-table">
          <thead><tr><th>Store</th><th class="number">${esc(data.salesComparisonYears.lastYear)}</th><th class="number">${esc(data.salesComparisonYears.thisYear)}</th></tr></thead>
          <tbody>${(data.salesComparison || []).map((row) => `<tr><td>${esc(row.store)}</td><td class="number">${fmt(row.lastYearSales)}</td><td class="number">${fmt(row.thisYearSales)}</td></tr>`).join('')}</tbody>
        </table>
      </article>
      <article class="card span-4">
        <h2>CSR of the Week</h2>
        <p><strong>${esc(data.csrOfWeek.csrName || 'TBD')}</strong></p>
        <p>${esc(data.csrOfWeek.store || '-')}</p>
        <p>${esc(data.csrOfWeek.quote || '')}</p>
      </article>
      <article class="card span-6">
        <h2>Competition Highlights</h2>
        <table class="data-table"><thead><tr><th>Category</th><th>Leader</th><th class="number">Value</th></tr></thead><tbody>${competitionRows || '<tr><td colspan="3">No data</td></tr>'}</tbody></table>
      </article>
      <article class="card span-6">
        <h2>Cleaning Checklist Progress</h2>
        <p>${esc(data.checklistSnapshot.store)} — ${esc(data.checklistSnapshot.date)}</p>
        <p>${fmt(data.checklistSnapshot.completed)} / ${fmt(data.checklistSnapshot.total)} complete</p>
        <div class="progress"><div style="width:${Math.round((data.checklistSnapshot.progress || 0) * 100)}%"></div></div>
      </article>
    </section>`;
  }

  function renderChecklist(data) {
    return `<section class="card">
      <div class="row">
        <h2>Checklist Page</h2>
        <input id="check-date" type="date" value="${esc(data.date)}" />
        <select id="check-store">${(state.config.defaultStores || []).map((s) => `<option ${s === data.store ? 'selected' : ''}>${esc(s)}</option>`).join('')}</select>
        <button id="check-load" class="tab">Load</button>
      </div>
      <div class="stack-sm">${(data.items || []).map((item) => `<label class="check-item"><span>${esc(item.task)}</span><input class="check-toggle" data-task="${esc(item.task)}" type="checkbox" ${item.completed ? 'checked' : ''}/></label>`).join('')}</div>
    </section>`;
  }

  function renderCategoryTab(categoryKey) {
    const category = state.categories.all.find((c) => c.categoryKey === categoryKey) || { categoryName: categoryKey };
    const data = state.categoryData[categoryKey] || { entries: [] };
    const manage = !!state.manageMode[categoryKey];
    const rows = (data.entries || []).map((entry, idx) => `<tr><td>${esc(entry.csr)}</td><td>${esc(entry.store)}</td><td class="number">${manage ? `<input class="comp-input cell-input" type="number" data-idx="${idx}" data-field="value" value="${Number(entry.value || 0)}">` : fmt(entry.value)}</td><td>${manage ? `<input class="comp-input" data-idx="${idx}" data-field="notes" value="${esc(entry.notes)}">` : esc(entry.notes)}</td></tr>`).join('');
    return `<section class="card"><div class="row"><h2>${esc(category.categoryName)} Page</h2><button id="category-manage-toggle" class="tab">${manage ? 'View Mode' : 'Manage Mode'}</button><button id="category-save" class="tab ${manage ? '' : 'hidden'}">Save</button></div><table class="data-table"><thead><tr><th>CSR</th><th>Store</th><th class="number">Value</th><th>Notes</th></tr></thead><tbody>${rows || '<tr><td colspan="4">No entries.</td></tr>'}</tbody></table></section>`;
  }

  function renderMetricsAdmin() {
    const rows = state.drafts.categories.map((row, idx) => `<tr><td><input class="metric-input" data-idx="${idx}" data-field="categoryKey" value="${esc(row.categoryKey)}"></td><td><input class="metric-input" data-idx="${idx}" data-field="categoryName" value="${esc(row.categoryName)}"></td><td><input class="metric-input" data-idx="${idx}" data-field="enabled" type="checkbox" ${row.enabled ? 'checked' : ''}></td></tr>`).join('');
    return `<section class="card"><div class="row"><h2>Metrics Admin Page</h2><button id="metric-add" class="tab">Add Category</button><button id="metric-save" class="tab">Save</button></div><table class="data-table"><thead><tr><th>Category Key</th><th>Category Name</th><th>Enabled</th></tr></thead><tbody>${rows}</tbody></table></section>`;
  }

  function renderLinksAdmin() {
    const rows = state.drafts.links.map((item, idx) => `<tr><td>${esc(item.key)}</td><td><input class="link-input" data-idx="${idx}" data-field="label" value="${esc(item.label)}"></td><td><input class="link-input" data-idx="${idx}" data-field="url" value="${esc(item.url)}"></td></tr>`).join('');
    return `<section class="card"><div class="row"><h2>Links Admin Page</h2><button id="links-save" class="tab">Save</button></div><table class="data-table"><thead><tr><th>Key</th><th>Label</th><th>URL</th></tr></thead><tbody>${rows}</tbody></table></section>`;
  }

  function bindChecklistActions() {
    const loadBtn = document.getElementById('check-load');
    if (loadBtn) {
      loadBtn.onclick = async () => {
        try {
          state.dateSelected = document.getElementById('check-date').value;
          const store = document.getElementById('check-store').value;
          state.checklistData = await api.getChecklist(state.dateSelected, store);
          renderCurrentTab();
        } catch (err) { toast(err.message || 'Unable to load checklist'); }
      };
    }

    document.querySelectorAll('.check-toggle').forEach((cb) => {
      cb.addEventListener('change', async () => {
        try {
          await api.setChecklistItem({ date: state.checklistData.date, store: state.checklistData.store, task: cb.dataset.task, completed: cb.checked });
        } catch (err) {
          toast(err.message || 'Unable to save checklist item');
        }
      });
    });
  }

  function bindCategoryActions(categoryKey) {
    const toggle = document.getElementById('category-manage-toggle');
    if (toggle) {
      toggle.onclick = () => {
        state.manageMode[categoryKey] = !state.manageMode[categoryKey];
        renderCurrentTab();
      };
    }

    document.querySelectorAll('.comp-input').forEach((input) => {
      input.addEventListener('input', () => {
        const draft = state.drafts.entries[categoryKey] || (state.drafts.entries[categoryKey] = JSON.parse(JSON.stringify(state.categoryData[categoryKey].entries || [])));
        draft[Number(input.dataset.idx)][input.dataset.field] = input.dataset.field === 'value' ? Number(input.value || 0) : input.value;
      });
    });

    const saveBtn = document.getElementById('category-save');
    if (saveBtn) {
      saveBtn.onclick = async () => {
        try {
          const draftRows = state.drafts.entries[categoryKey] || state.categoryData[categoryKey].entries || [];
          await api.saveCompetitionEntries({ entries: draftRows.map((row) => ({ weekStart: state.categoryData[categoryKey].weekStart, store: row.store || '', csr: row.csr, categoryKey, value: Number(row.value || 0), notes: row.notes || '' })) });
          const payload = await api.getBootstrapPayload(state.dateSelected, state.storeFilter);
          hydrateState(payload);
          renderTopTabs();
          renderCurrentTab();
          toast('Competition entries saved.');
        } catch (err) { toast(err.message || 'Unable to save entries'); }
      };
    }
  }

  function bindMetricsAdminActions() {
    const addBtn = document.getElementById('metric-add');
    if (addBtn) {
      addBtn.onclick = () => {
        state.drafts.categories.push({ categoryKey: '', categoryName: 'New Category', enabled: true });
        renderCurrentTab();
      };
    }

    document.querySelectorAll('.metric-input').forEach((input) => {
      const setVal = () => {
        const row = state.drafts.categories[Number(input.dataset.idx)];
        row[input.dataset.field] = input.type === 'checkbox' ? input.checked : input.value;
      };
      input.addEventListener('input', setVal);
      input.addEventListener('change', setVal);
    });

    const saveBtn = document.getElementById('metric-save');
    if (saveBtn) {
      saveBtn.onclick = async () => {
        try {
          await api.saveCompetitionCategories({ categories: state.drafts.categories });
          const payload = await api.getBootstrapPayload(state.dateSelected, state.storeFilter);
          hydrateState(payload);
          renderTopTabs();
          renderCurrentTab();
          toast('Categories saved.');
        } catch (err) { toast(err.message || 'Unable to save categories'); }
      };
    }
  }

  function bindLinksAdminActions() {
    document.querySelectorAll('.link-input').forEach((input) => {
      input.addEventListener('input', () => {
        state.drafts.links[Number(input.dataset.idx)][input.dataset.field] = input.value;
      });
    });

    const saveBtn = document.getElementById('links-save');
    if (saveBtn) {
      saveBtn.onclick = async () => {
        try {
          state.links = await api.saveAppLinks({ links: state.drafts.links });
          state.drafts.links = Object.values(state.links);
          toast('Links saved.');
        } catch (err) { toast(err.message || 'Unable to save links'); }
      };
    }
  }

  function renderCurrentTab() {
    const target = document.getElementById('tab-content');
    if (state.activeTab === 'dashboard') {
      target.innerHTML = renderDashboard();
      return;
    }
    if (state.activeTab === 'checklist') {
      target.innerHTML = renderChecklist(state.checklistData);
      bindChecklistActions();
      return;
    }
    if (state.activeTab === 'metrics_admin') {
      target.innerHTML = renderMetricsAdmin();
      bindMetricsAdminActions();
      return;
    }
    if (state.activeTab === 'links_admin') {
      target.innerHTML = renderLinksAdmin();
      bindLinksAdminActions();
      return;
    }
    if (state.activeTab.startsWith('category:')) {
      const categoryKey = state.activeTab.split(':')[1];
      target.innerHTML = renderCategoryTab(categoryKey);
      bindCategoryActions(categoryKey);
      return;
    }
  }

  function hydrateState(payload) {
    state.config = Object.assign({}, state.config, payload.config || {});
    state.dashboardData = payload.dashboardData;
    state.checklistData = payload.checklist;
    state.categories = payload.categories;
    state.categoryData = payload.categoryData || {};
    state.links = payload.links || {};
    state.drafts.links = Object.values(state.links);
    state.drafts.categories = JSON.parse(JSON.stringify((state.categories && state.categories.all) || []));
  }

  async function bootstrap() {
    try {
      setLoading('Checking access', 10);
      const auth = await api.getAuthStatus();
      if (!auth.authorized) {
        document.getElementById('auth-loading').classList.add('hidden');
        document.getElementById('unauthorized').classList.remove('hidden');
        return;
      }

      state.user = auth.email;
      document.getElementById('user-email').textContent = auth.email;
      setLoading('Loading dashboard data', 45);

      const payload = await api.getBootstrapPayload(state.dateSelected, state.storeFilter);
      hydrateState(payload);
      setLoading('Rendering pages and navigation', 80);

      setupTabs();
      renderTopTabs();
      renderCurrentTab();

      setLoading('Complete', 100);
      setTimeout(() => {
        document.getElementById('auth-loading').classList.add('hidden');
        document.getElementById('main-ui').classList.remove('hidden');
      }, 150);

      setInterval(async () => {
        try {
          const refresh = await api.getBootstrapPayload(state.dateSelected, state.storeFilter);
          hydrateState(refresh);
          renderTopTabs();
          renderCurrentTab();
        } catch (err) {
          console.error(err);
        }
      }, state.config.refreshIntervalMs || 5 * 60 * 1000);
    } catch (err) {
      console.error(err);
      document.getElementById('auth-loading').classList.add('hidden');
      document.getElementById('unauthorized').classList.remove('hidden');
      toast(err.message || 'Failed to load dashboard');
    }
  }

  bootstrap();
</script>
