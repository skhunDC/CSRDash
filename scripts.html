<script>
  const state = {
    user: null,
    activeTab: 'dashboard',
    storeFilter: 'All',
    dateSelected: new Date().toISOString().slice(0, 10),
    dashboardData: null,
    competitionsData: null,
    checklistData: null,
    config: { refreshIntervalMs: 5 * 60 * 1000, defaultStores: ['Plant', 'Muirfield', 'Frantz', 'Morse', 'Newark', 'Granville', 'Short North'] },
    salesTable: {
      thisYear: '2026',
      lastYear: '2025',
      title: '',
      titleAuto: true,
      initialized: false
    }
  };

  const api = {
    call(name, args = []) {
      return new Promise((resolve, reject) => {
        const runner = google.script.run.withSuccessHandler(resolve).withFailureHandler(reject);
        runner[name](...args);
      });
    },
    getAuthStatus() { return this.call('getAuthStatus'); },
    getClientConfig() { return this.call('getClientConfig'); },
    getDashboardData() { return this.call('getDashboardData'); },
    getCompetitionsData() { return this.call('getCompetitionsData'); },
    saveCompetitionEntry(payload) { return this.call('saveCompetitionEntry', [payload]); },
    saveSalesEntry(payload) { return this.call('saveSalesEntry', [payload]); },
    saveCsrRecognition(payload) { return this.call('saveCsrRecognition', [payload]); },
    savePerformanceEntry(payload) { return this.call('savePerformanceEntry', [payload]); },
    saveScheduleEntry(payload) { return this.call('saveScheduleEntry', [payload]); },
    getChecklist(date, store) { return this.call('getChecklist', [date, store]); },
    setChecklistItem(payload) { return this.call('setChecklistItem', [payload]); }
  };

  const fmtCurrency = (n) => new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(Number(n || 0));
  const fmtPercent = (n) => `${(Number(n || 0) * 100).toFixed(1)}%`;
  const defaultSalesTitle = (thisYear, lastYear) => `Sales Week ${thisYear} vs ${lastYear}`;

  function withDeltaSign(amount) {
    const absolute = fmtCurrency(Math.abs(amount));
    if (amount > 0) return `+${absolute}`;
    if (amount < 0) return `-${absolute}`;
    return absolute;
  }

  function getTrendClass(value) {
    if (value > 0) return 'trend-positive';
    if (value < 0) return 'trend-negative';
    return 'trend-neutral';
  }

  function buildTrendLineSvg(previousYearValue, thisYearValue) {
    const width = 120;
    const height = 30;
    const left = 10;
    const right = width - 10;
    const top = 6;
    const bottom = height - 6;
    const max = Math.max(previousYearValue, thisYearValue, 1);
    const yFor = (value) => bottom - ((value / max) * (bottom - top));
    const y1 = yFor(previousYearValue);
    const y2 = yFor(thisYearValue);
    const trendClass = getTrendClass(thisYearValue - previousYearValue);

    return `<svg class="trend-graph ${trendClass}" viewBox="0 0 ${width} ${height}" role="img" aria-label="Trend line">
      <line class="trend-baseline" x1="${left}" y1="${bottom}" x2="${right}" y2="${bottom}"></line>
      <polyline class="trend-path" points="${left},${y1} ${right},${y2}"></polyline>
      <circle class="trend-point" cx="${left}" cy="${y1}" r="2.8"></circle>
      <circle class="trend-point" cx="${right}" cy="${y2}" r="2.8"></circle>
    </svg>`;
  }

  function hydrateSalesTableState(data) {
    const serverThisYear = String((data.salesComparisonYears && data.salesComparisonYears.thisYear) || 2026);
    const serverLastYear = String((data.salesComparisonYears && data.salesComparisonYears.lastYear) || 2025);

    if (!state.salesTable.initialized) {
      state.salesTable.thisYear = serverThisYear;
      state.salesTable.lastYear = serverLastYear;
      state.salesTable.initialized = true;
    }

    if (state.salesTable.titleAuto) {
      state.salesTable.title = defaultSalesTitle(state.salesTable.thisYear, state.salesTable.lastYear);
    } else if (!state.salesTable.title) {
      state.salesTable.title = defaultSalesTitle(serverThisYear, serverLastYear);
      state.salesTable.titleAuto = true;
    }
  }

  function toast(message) {
    const node = document.getElementById('toast');
    node.textContent = message;
    node.classList.remove('hidden');
    setTimeout(() => node.classList.add('hidden'), 3500);
  }

  function safeRun(fn) {
    return fn().catch((err) => {
      toast(err.message || 'Server error');
      console.error(err);
    });
  }

  function setupTabs() {
    document.querySelectorAll('.tab').forEach((btn) => {
      btn.addEventListener('click', () => {
        const tab = btn.dataset.tab;
        if (!tab) return;
        document.querySelectorAll('.tab').forEach((b) => b.classList.remove('active'));
        btn.classList.add('active');
        state.activeTab = tab;
        renderCurrentTab();
      });
    });
  }

  function renderDashboard(data) {
    hydrateSalesTableState(data);
    const stores = ['All'].concat(state.config.defaultStores || []);
    const filteredOff = data.scheduleWeek.offList.filter((row) => state.storeFilter === 'All' || row.store === state.storeFilter);
    const imageMarkup = data.csrOfWeek.imageUrl ? `<img src="${data.csrOfWeek.imageUrl}" alt="CSR of the week" class="csr-week-image" />` : '';

    const salesRows = data.salesComparison.map((row) => {
      const growth = row.deltaPct >= 0;
      const deltaClass = getTrendClass(row.delta);
      return `<tr>
        <td>${row.store}</td>
        <td class="number"><input class="cell-input number sales-input sales-last-year" data-store="${row.store}" data-slot="lastYear" type="number" value="${Number(row.salesLastYear || 0)}" /></td>
        <td class="number"><input class="cell-input number sales-input sales-this-year" data-store="${row.store}" data-slot="thisYear" type="number" value="${Number(row.salesThisYear || 0)}" /></td>
        <td class="number delta-value ${deltaClass}">${withDeltaSign(row.delta)} (${fmtPercent(row.deltaPct)})</td>
        <td class="trend-cell"><span class="pill ${growth ? 'good' : 'bad'}">${growth ? 'Up' : 'Down'}</span>${buildTrendLineSvg(Number(row.salesLastYear || 0), Number(row.salesThisYear || 0))}</td>
      </tr>`;
    }).join('');

    const perfRows = data.csrPerformanceYesterday.entries.map((row) => {
      const isTop = data.csrPerformanceYesterday.topPerformer && data.csrPerformanceYesterday.topPerformer.csrName === row.csrName;
      const deltaPerHour = row.dollarsPerHour - data.goalPerHour;
      const trendClass = getTrendClass(deltaPerHour);
      const trendLabel = deltaPerHour > 0 ? 'Above Goal' : deltaPerHour < 0 ? 'Below Goal' : 'At Goal';
      return `<tr><td>${row.csrName} ${isTop ? '🏆' : ''}</td><td>${row.store}</td><td class="number">${fmtCurrency(row.dollarsPerHour)}</td><td class="number">${fmtCurrency(row.sales)}</td><td class="number">${Number(row.hours).toFixed(2)}</td><td class="${trendClass}"><span class="pill ${deltaPerHour >= 0 ? 'good' : 'bad'}">${trendLabel}</span> <span class="caption">${withDeltaSign(deltaPerHour)}</span></td></tr>`;
    }).join('');

    const offRows = filteredOff.map((row) => `<li>${row.date}: <strong>${row.csrName}</strong> (${row.store})</li>`).join('') || '<li>No one marked OFF for selected store this week.</li>';
    const compCards = data.competitionsSnapshot.map((metric) => `<p><strong>${metric.metric}:</strong> ${metric.leader ? `${metric.leader.csrName} (${metric.leader.value})` : 'No entries'}</p>`).join('');

    return `
      <section class="grid">
        <article class="card span-8">
          <div class="card-head sales-card-head"><input id="sales-title-input" class="title-input" value="${state.salesTable.title}" aria-label="Sales table title" /><span class="caption">Week of ${data.scheduleWeek.weekStart}</span></div>
          <div class="row sales-controls"><label class="caption">Last Year <input id="sales-last-year-header" class="year-header-input" value="${state.salesTable.lastYear}" /></label><label class="caption">This Year <input id="sales-this-year-header" class="year-header-input" value="${state.salesTable.thisYear}" /></label><button id="sales-title-reset" class="tab" ${state.salesTable.titleAuto ? 'disabled' : ''}>Reset to auto title</button></div>
          <p class="caption">Spreadsheet-style: edit cells and tab to auto-save.</p>
          <table class="data-table editable-table-frame"><thead><tr><th>Store</th><th class="number">${state.salesTable.lastYear}</th><th class="number">${state.salesTable.thisYear}</th><th class="number">Δ ${state.salesTable.thisYear}-${state.salesTable.lastYear}</th><th>Trend</th></tr></thead><tbody>${salesRows}</tbody></table>
        </article>

        <article class="card span-4">
          <h2>CSR of the Week</h2>
          ${imageMarkup}
          <div class="stack-sm">
            <input id="csr-name" placeholder="CSR name" value="${data.csrOfWeek.csrName || ''}" />
            <select id="csr-store">${(state.config.defaultStores || []).map((s) => `<option ${s === data.csrOfWeek.store ? 'selected' : ''}>${s}</option>`).join('')}</select>
            <textarea id="csr-quote" rows="3" placeholder="Recognition quote">${data.csrOfWeek.quote || ''}</textarea>
            <label class="upload-field">CSR image (recommended 320×220)
              <input id="csr-image" type="file" accept="image/*" />
            </label>
            <button id="csr-save" class="tab active">Save CSR of Week</button>
          </div>
        </article>

        <article class="card span-6">
          <h2>CSR $/Hour (Yesterday)</h2>
          <p>Goal: ${fmtCurrency(data.goalPerHour)}</p>
          <table class="data-table"><thead><tr><th>CSR</th><th>Store</th><th class="number">$/Hour</th><th class="number">Sales</th><th class="number">Hours</th><th>Trend</th></tr></thead><tbody>${perfRows}</tbody></table>
          <div class="row">
            <input id="perf-csr" placeholder="CSR name" />
            <select id="perf-store">${(state.config.defaultStores || []).map((s) => `<option>${s}</option>`).join('')}</select>
            <input id="perf-sales" type="number" min="0" step="1" placeholder="Sales" />
            <input id="perf-hours" type="number" min="0" step="0.25" placeholder="Hours" />
            <button id="perf-save" class="tab">Add / Update</button>
          </div>
        </article>

        <article class="card span-6">
          <div class="row"><h2>Weekly Schedule — Who's OFF</h2><select id="dash-store-filter">${stores.map((s) => `<option ${s === state.storeFilter ? 'selected' : ''}>${s}</option>`).join('')}</select></div>
          <p>${data.scheduleWeek.weekStart} → ${data.scheduleWeek.weekEnd}</p>
          <ul>${offRows}</ul>
          <div class="row">
            <input id="sched-date" type="date" value="${data.scheduleWeek.weekStart}" />
            <select id="sched-store">${(state.config.defaultStores || []).map((s) => `<option>${s}</option>`).join('')}</select>
            <input id="sched-csr" placeholder="CSR name" />
            <select id="sched-status"><option>OFF</option><option>9a-5p</option><option>10a-6p</option></select>
            <button id="sched-save" class="tab">Save Schedule</button>
          </div>
        </article>

        <article class="card span-6"><h2>Competitions Highlights</h2>${compCards}</article>

        <article class="card span-6">
          <h2>Cleaning Checklist Progress</h2>
          <p>${data.checklistSnapshot.store} — ${data.checklistSnapshot.date}</p>
          <p>${data.checklistSnapshot.completed} / ${data.checklistSnapshot.total} complete</p>
          <div class="progress"><div style="width:${Math.round(data.checklistSnapshot.progress * 100)}%"></div></div>
        </article>
      </section>`;
  }

  function renderCompetitions(data) {
    const metrics = [...new Set(data.rows.map((r) => r.metric))];
    const csrOptions = [...new Set(data.rows.map((r) => r.csrName))].map((c) => `<option>${c}</option>`).join('');
    const stores = state.config.defaultStores || ['Plant', 'Muirfield', 'Frantz', 'Morse', 'Newark', 'Granville', 'Short North'];

    const blocks = data.leaders.map((metricObj) => {
      const rows = metricObj.entries.map((entry) => `<tr><td>${entry.csrName}</td><td>${entry.store}</td><td class="number">${entry.value}</td></tr>`).join('');
      return `<article class="card span-4"><h2>${metricObj.metric}</h2><p>Leader: <strong>${metricObj.leader ? metricObj.leader.csrName : '-'}</strong></p><table class="data-table"><thead><tr><th>CSR</th><th>Store</th><th class="number">Value</th></tr></thead><tbody>${rows}</tbody></table></article>`;
    }).join('');

    return `
      <section class="row">
        <input id="comp-metric" list="metric-list" placeholder="Metric name (editable)" value="${metrics[0] || ''}" />
        <datalist id="metric-list">${metrics.map((m) => `<option value="${m}">`).join('')}</datalist>
        <select id="comp-store">${stores.map((s) => `<option>${s}</option>`).join('')}</select>
        <select id="comp-csr">${csrOptions}</select>
        <input id="comp-value" type="number" min="0" step="1" placeholder="Value" />
        <button id="comp-save" class="tab active">Save Entry</button>
      </section>
      <section class="grid">${blocks}</section>`;
  }

  function renderChecklist(data) {
    const stores = state.config.defaultStores || ['Plant', 'Muirfield', 'Frantz', 'Morse', 'Newark', 'Granville', 'Short North'];
    const items = data.items.map((item) => `<div class="check-item"><label>${item.task}</label><input data-task="${item.task}" class="check-toggle" type="checkbox" ${item.completed ? 'checked' : ''} /></div>`).join('');
    const completed = data.items.filter((item) => item.completed).length;
    const pct = data.items.length ? Math.round((completed / data.items.length) * 100) : 0;

    return `<section class="card"><div class="row"><label>Date <input type="date" id="check-date" value="${data.date}" /></label><label>Store <select id="check-store">${stores.map((s) => `<option ${s === data.store ? 'selected' : ''}>${s}</option>`).join('')}</select></label><button id="check-load" class="tab">Load</button><a class="tab" href="?page=print" target="_blank">Print View</a></div><h2>End of Day Checklist — ${data.store}</h2><p>${completed}/${data.items.length} complete</p><div class="progress"><div style="width:${pct}%"></div></div><div style="margin-top:12px">${items}</div></section>`;
  }

  async function loadDashboard() { state.dashboardData = await api.getDashboardData(); }
  async function loadCompetitions() { state.competitionsData = await api.getCompetitionsData(); }
  async function loadChecklist() {
    const store = state.storeFilter === 'All' ? (state.config.defaultStores[0] || 'Plant') : state.storeFilter;
    state.checklistData = await api.getChecklist(state.dateSelected, store);
  }

  function bindDashboardActions() {
    const syncSalesTitle = () => {
      if (!state.salesTable.titleAuto) return;
      state.salesTable.title = defaultSalesTitle(state.salesTable.thisYear, state.salesTable.lastYear);
      const input = document.getElementById('sales-title-input');
      if (input) input.value = state.salesTable.title;
    };

    const updateSalesRowPresentation = (row) => {
      const thisInput = row.querySelector('.sales-this-year');
      const lastInput = row.querySelector('.sales-last-year');
      const deltaNode = row.querySelector('.delta-value');
      const trendNode = row.querySelector('.trend-cell');
      if (!thisInput || !lastInput || !deltaNode || !trendNode) return;

      const thisVal = Number(thisInput.value || 0);
      const lastVal = Number(lastInput.value || 0);
      const delta = thisVal - lastVal;
      const deltaPct = lastVal ? delta / lastVal : 0;
      deltaNode.classList.remove('trend-positive', 'trend-negative', 'trend-neutral');
      deltaNode.classList.add(getTrendClass(delta));
      deltaNode.textContent = `${withDeltaSign(delta)} (${fmtPercent(deltaPct)})`;

      const trendClass = getTrendClass(delta);
      const trendLabel = delta > 0 ? 'Up' : delta < 0 ? 'Down' : 'Flat';
      trendNode.innerHTML = `<span class="pill ${delta > 0 ? 'good' : delta < 0 ? 'bad' : 'neutral'}">${trendLabel}</span>${buildTrendLineSvg(lastVal, thisVal)}`;
      const svg = trendNode.querySelector('.trend-graph');
      if (svg) {
        svg.classList.remove('trend-positive', 'trend-negative', 'trend-neutral');
        svg.classList.add(trendClass);
      }
    };

    const select = document.getElementById('dash-store-filter');
    if (select) {
      select.addEventListener('change', () => {
        state.storeFilter = select.value;
        renderCurrentTab();
      });
    }

    document.querySelectorAll('.sales-input').forEach((input) => {
      input.addEventListener('input', () => {
        updateSalesRowPresentation(input.closest('tr'));
      });
      input.addEventListener('change', async () => {
        await safeRun(async () => {
          const year = input.dataset.slot === 'thisYear' ? Number(state.salesTable.thisYear) : Number(state.salesTable.lastYear);
          if (!Number.isFinite(year)) throw new Error('Year headers must be numeric before saving sales values.');
          await api.saveSalesEntry({
            weekStart: state.dashboardData.scheduleWeek.weekStart,
            store: input.dataset.store,
            year,
            sales: Number(input.value || 0)
          });
          await loadDashboard();
          renderCurrentTab();
        });
      });
    });

    const titleInput = document.getElementById('sales-title-input');
    const resetBtn = document.getElementById('sales-title-reset');
    const thisYearInput = document.getElementById('sales-this-year-header');
    const lastYearInput = document.getElementById('sales-last-year-header');

    if (titleInput) {
      titleInput.addEventListener('input', () => {
        state.salesTable.title = titleInput.value;
        const expected = defaultSalesTitle(state.salesTable.thisYear, state.salesTable.lastYear);
        state.salesTable.titleAuto = titleInput.value === expected;
        if (resetBtn) resetBtn.disabled = state.salesTable.titleAuto;
      });
    }

    if (resetBtn) {
      resetBtn.addEventListener('click', () => {
        state.salesTable.titleAuto = true;
        state.salesTable.title = defaultSalesTitle(state.salesTable.thisYear, state.salesTable.lastYear);
        renderCurrentTab();
      });
    }

    [
      { input: thisYearInput, key: 'thisYear' },
      { input: lastYearInput, key: 'lastYear' }
    ].forEach((entry) => {
      if (!entry.input) return;
      entry.input.addEventListener('change', () => {
        state.salesTable[entry.key] = entry.input.value.trim();
        syncSalesTitle();
        renderCurrentTab();
      });
    });

    const csrSave = document.getElementById('csr-save');
    if (csrSave) {
      csrSave.addEventListener('click', async () => {
        await safeRun(async () => {
          const fileInput = document.getElementById('csr-image');
          const file = fileInput.files && fileInput.files[0];
          const imageData = file ? await readFileAsDataUrl(file) : '';

          await api.saveCsrRecognition({
            weekStart: state.dashboardData.scheduleWeek.weekStart,
            csrName: document.getElementById('csr-name').value.trim(),
            store: document.getElementById('csr-store').value,
            quote: document.getElementById('csr-quote').value.trim(),
            imageData
          });
          await loadDashboard();
          renderCurrentTab();
          toast('CSR of the week saved.');
        });
      });
    }

    const perfSave = document.getElementById('perf-save');
    if (perfSave) {
      perfSave.addEventListener('click', async () => {
        await safeRun(async () => {
          const yesterday = new Date();
          yesterday.setDate(yesterday.getDate() - 1);
          const dateIso = yesterday.toISOString().slice(0, 10);
          await api.savePerformanceEntry({
            date: dateIso,
            csrName: document.getElementById('perf-csr').value.trim(),
            store: document.getElementById('perf-store').value,
            sales: Number(document.getElementById('perf-sales').value || 0),
            hours: Number(document.getElementById('perf-hours').value || 0)
          });
          await loadDashboard();
          renderCurrentTab();
        });
      });
    }

    const schedSave = document.getElementById('sched-save');
    if (schedSave) {
      schedSave.addEventListener('click', async () => {
        await safeRun(async () => {
          await api.saveScheduleEntry({
            date: document.getElementById('sched-date').value,
            store: document.getElementById('sched-store').value,
            csrName: document.getElementById('sched-csr').value.trim(),
            shiftStatus: document.getElementById('sched-status').value
          });
          await loadDashboard();
          renderCurrentTab();
        });
      });
    }
  }

  function bindCompetitionsActions() {
    const btn = document.getElementById('comp-save');
    if (!btn) return;
    btn.addEventListener('click', async () => {
      await safeRun(async () => {
        const metric = document.getElementById('comp-metric').value.trim();
        if (!metric) throw new Error('Metric name is required.');
        await api.saveCompetitionEntry({
          weekStart: state.dashboardData.scheduleWeek.weekStart,
          metric,
          store: document.getElementById('comp-store').value,
          csrName: document.getElementById('comp-csr').value,
          value: Number(document.getElementById('comp-value').value || 0)
        });
        await Promise.all([loadCompetitions(), loadDashboard()]);
        renderCurrentTab();
      });
    });
  }

  function bindChecklistActions() {
    const loadBtn = document.getElementById('check-load');
    if (loadBtn) {
      loadBtn.addEventListener('click', async () => {
        state.dateSelected = document.getElementById('check-date').value;
        state.storeFilter = document.getElementById('check-store').value;
        await safeRun(async () => { await loadChecklist(); renderCurrentTab(); });
      });
    }
    document.querySelectorAll('.check-toggle').forEach((cb) => {
      cb.addEventListener('change', async () => {
        await safeRun(async () => {
          await api.setChecklistItem({ date: state.checklistData.date, store: state.checklistData.store, task: cb.dataset.task, completed: cb.checked });
          await Promise.all([loadChecklist(), loadDashboard()]);
          renderCurrentTab();
        });
      });
    });
  }

  function readFileAsDataUrl(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  function renderCurrentTab() {
    const target = document.getElementById('tab-content');
    if (state.activeTab === 'dashboard') {
      target.innerHTML = renderDashboard(state.dashboardData);
      bindDashboardActions();
      return;
    }
    if (state.activeTab === 'competitions') {
      target.innerHTML = renderCompetitions(state.competitionsData);
      bindCompetitionsActions();
      return;
    }
    target.innerHTML = renderChecklist(state.checklistData);
    bindChecklistActions();
  }

  async function bootstrap() {
    try {
      const auth = await api.getAuthStatus();
      document.getElementById('auth-loading').classList.add('hidden');
      if (!auth.authorized) {
        document.getElementById('unauthorized').classList.remove('hidden');
        document.getElementById('main-ui').classList.add('hidden');
        return;
      }

      state.user = auth.email;
      document.getElementById('user-email').textContent = auth.email;
      document.getElementById('main-ui').classList.remove('hidden');
      setupTabs();

      state.config = Object.assign({}, state.config, await api.getClientConfig());
      await Promise.all([loadDashboard(), loadCompetitions(), loadChecklist()]);
      renderCurrentTab();

      setInterval(() => safeRun(async () => {
        await Promise.all([loadDashboard(), loadCompetitions(), loadChecklist()]);
        renderCurrentTab();
      }), state.config.refreshIntervalMs || 5 * 60 * 1000);
    } catch (err) {
      document.getElementById('auth-loading').classList.add('hidden');
      document.getElementById('unauthorized').classList.remove('hidden');
      toast(err.message || 'Failed to start app');
    }
  }

  bootstrap();
</script>
